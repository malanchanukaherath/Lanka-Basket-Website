name: CD - Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SERVER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/lanka-basket-server" >> "$GITHUB_OUTPUT"
          echo "CLIENT_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/lanka-basket-client" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.SERVER_IMAGE }}:latest
            ${{ steps.meta.outputs.SERVER_IMAGE }}:${{ steps.meta.outputs.SHORT_SHA }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
            VITE_STRIPE_PUBLIC_KEY=${{ vars.VITE_STRIPE_PUBLIC_KEY || secrets.VITE_STRIPE_PUBLIC_KEY }}
          tags: |
            ${{ steps.meta.outputs.CLIENT_IMAGE }}:latest
            ${{ steps.meta.outputs.CLIENT_IMAGE }}:${{ steps.meta.outputs.SHORT_SHA }}